<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js from CDN for simplicity -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-wrap"></div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen">
        <div class="logo">
            <div class="title-top">🏃 OFFICIAL</div>
            <div class="title-main">SUBWAY</div>
            <div class="title-sub">AI AGENT</div>
        </div>
        
        <div class="mode-selection">
            <p>CHOOSE GAME MODE</p>
            <div class="btn-group">
                <button id="human-mode-btn" class="mode-btn active" data-mode="human">HUMAN PLAYER</button>
                <button id="ai-mode-btn" class="mode-btn" data-mode="ai">AI PLAYER</button>
                <button id="train-mode-btn" class="mode-btn" data-mode="train">TRAIN AI</button>
            </div>
            <div id="ai-weights-list" class="hidden"></div>
            <div id="train-sub-btns" class="hidden">
                <div class="train-sub-row">
                    <button id="cold-start-btn" class="train-sub-btn cold">❄ COLD START</button>
                    <button id="warm-start-btn" class="train-sub-btn warm">🔥 WARM START</button>
                </div>
                <div id="warm-weights-list" class="hidden"></div>
            </div>
        </div>

        <button id="play-btn">▶ &nbsp;PLAY</button>
        <div class="hint">← → LANES | ↑ JUMP | ↓ SLIDE</div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="ai-stats" class="hidden">
            <div class="stat-item">Iteration: <span id="stat-iteration">0</span></div>
            <div class="stat-item">Trainings: <span id="stat-train-count">0</span></div>
            <div class="stat-item">Best Run: <span id="stat-best-dist">0m</span></div>
            <div class="stat-item">Mean Score: <span id="stat-avg-score">0m</span></div>
        </div>
        <div id="ai-probs" class="hidden">
            <table id="ai-probs-table">
                <thead><tr><th>Action</th><th>Probability</th></tr></thead>
                <tbody>
                    <tr><td>Left</td><td id="prob-L">-</td></tr>
                    <tr><td>Right</td><td id="prob-R">-</td></tr>
                    <tr><td>Jump</td><td id="prob-J">-</td></tr>
                    <tr><td>Slide</td><td id="prob-S">-</td></tr>
                    <tr><td>Nothing</td><td id="prob-N">-</td></tr>
                </tbody>
            </table>
        </div>
        <div id="ai-params-container" class="hidden"></div>
        <div id="pause-overlay" class="hidden">PAUSE</div>
        <button id="stop-training-btn" class="hidden" style="margin-bottom: 10px; padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 100; pointer-events: auto;">🛑 STOP TRAINING</button>
        <div id="score-val">0m</div>
        <div id="alive-info" class="hidden">
            <div id="alive-train-count">Trainings: 0</div>
            <div id="alive-count">Agents: 0/0</div>
        </div>
        <div id="coin-row">
            <div class="coin-icon"></div>
            <span id="coin-val">0</span>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="go-screen" class="screen hidden">
        <div id="go-title">GAME OVER</div>
        <div id="go-score">0m</div>
        <div id="go-coins-row">
            <div id="go-coins-earned">+0</div>
            <div class="star-coin"></div>
        </div>
        <div id="go-hint">TAP / SPACE TO RESTART</div>
    </div>

    <!-- Scripts Loading (Standard scripts to avoid CORS issues) -->
    <script src="src/constants.js"></script>
    <script src="src/models.js"></script>
    <script src="src/Controller.js"></script>
    <script src="src/Player.js"></script>
    <script src="src/World.js"></script>
    <script src="src/Game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
