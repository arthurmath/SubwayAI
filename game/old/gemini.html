<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rail Runner - Visual Overhaul</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #87CEEB; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: white; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); pointer-events: auto; text-align: center; }
        .hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 8px; border-bottom: 3px solid #f1c40f; font-size: 22px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        h1 { color: #f1c40f; font-size: 70px; margin: 0; text-shadow: 2px 4px 10px rgba(0,0,0,0.8); letter-spacing: 2px; }
        p { font-size: 1.2rem; margin-bottom: 30px; text-shadow: 1px 1px 2px #000; }
        button { padding: 15px 60px; font-size: 22px; font-weight: bold; cursor: pointer; background: linear-gradient(to bottom, #2ecc71, #27ae60); color: white; border: none; border-radius: 5px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); transition: 0.1s; margin-top: 10px; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        button:active { transform: translateY(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui">
    <div id="hud" class="hud hidden">
        <div class="stat">SCORE: <span id="score-val">0</span></div>
        <div class="stat">COINS: <span id="coin-val">0</span></div>
    </div>
    <div id="start-screen" class="screen">
        <h1>RAIL RUNNER</h1>
        <p>A/D : Change Lanes &nbsp;|&nbsp; W : Jump &nbsp;|&nbsp; S : Slide</p>
        <button onclick="startGame()">RUN</button>
    </div>
    <div id="game-over" class="screen hidden">
        <h1 style="color:#e74c3c">BUSTED</h1>
        <div id="final-score" class="stat" style="margin-bottom: 20px;">Score: 0</div>
        <button onclick="resetGame()">TRY AGAIN</button>
    </div>
</div>

<script>
/** * 1. CONSTANTS & GLOBALS - REBALANCED
 * Speed and score drastically reduced for a controlled start.
 */
const LANES = [-4, 0, 4];
const GAME_SPEED_START = 0.18; // Reduced by ~50%
let speed = GAME_SPEED_START;
let score = 0;
let coins = 0;
let isPlaying = false;

let scene, camera, renderer, clock;
let player, worldManager, obstacleManager;

/**
 * PLAYER CLASS (Kept intact, proportions maintained)
 */
class Player {
    constructor() {
        this.group = new THREE.Group();
        this.lane = 1;
        this.targetX = LANES[this.lane];
        this.y = 0;
        this.velocityY = 0;
        this.isJumping = false;
        this.isSliding = false;
        this.slideTimer = 0;
        this.hitbox = new THREE.Box3();

        this.createModel();
        scene.add(this.group);
    }

    createModel() {
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 });
        const denimMat = new THREE.MeshStandardMaterial({ color: 0x5d9ecf, roughness: 0.8 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const capMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.7 });

        this.leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1, 0.4), denimMat);
        this.leftLeg.position.set(-0.3, 0.5, 0);
        this.leftLeg.castShadow = true;
        this.rightLeg = this.leftLeg.clone();
        this.rightLeg.position.x = 0.3;

        this.torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.6), whiteMat);
        this.torso.position.set(0, 1.6, 0);
        this.torso.castShadow = true;
        
        const vest = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.1, 0.7), denimMat);
        this.torso.add(vest);

        this.head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), skinMat);
        this.head.position.set(0, 2.5, 0);
        this.head.castShadow = true;
        
        const cap = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.2, 0.9), capMat);
        cap.position.set(0, 0.35, -0.1);
        this.head.add(cap);

        this.leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), whiteMat);
        this.leftArm.position.set(-0.6, 2, 0);
        this.leftArm.castShadow = true;
        this.rightArm = this.leftArm.clone();
        this.rightArm.position.x = 0.6;

        this.modelGroup = new THREE.Group();
        this.modelGroup.add(this.leftLeg, this.rightLeg, this.torso, this.head, this.leftArm, this.rightArm);
        this.group.add(this.modelGroup);
    }

    update(delta) {
        this.group.position.x += (this.targetX - this.group.position.x) * 0.15;

        if (this.isJumping) {
            this.y += this.velocityY;
            this.velocityY -= 0.018; // Slightly tweaked gravity for slower speed
            if (this.y <= 0) {
                this.y = 0;
                this.isJumping = false;
            }
        }
        this.group.position.y = this.y;

        if (this.isSliding) {
            this.slideTimer -= delta;
            if (this.slideTimer <= 0) this.cancelSlide();
        }

        if (!this.isJumping && !this.isSliding) {
            const t = Date.now() * 0.015;
            this.leftLeg.rotation.x = Math.sin(t) * 0.5;
            this.rightLeg.rotation.x = Math.sin(t + Math.PI) * 0.5;
            this.leftArm.rotation.x = Math.sin(t + Math.PI) * 0.4;
            this.rightArm.rotation.x = Math.sin(t) * 0.4;
        }

        this.hitbox.setFromObject(this.group);
        this.hitbox.expandByScalar(-0.15); // Forgiving hitbox
    }

    jump() {
        if (!this.isJumping) {
            this.isJumping = true;
            this.velocityY = 0.32;
            this.cancelSlide();
        }
    }

    slide() {
        if (!this.isJumping && !this.isSliding) {
            this.isSliding = true;
            this.slideTimer = 0.8;
            this.modelGroup.scale.y = 0.5;
            this.modelGroup.position.y = -0.5;
        }
    }

    cancelSlide() {
        this.isSliding = false;
        this.modelGroup.scale.y = 1;
        this.modelGroup.position.y = 0;
    }
}

/**
 * WORLD MANAGER - VISUAL OVERHAUL
 * Added realistic trees, gravel patches, shiny rails.
 */
class WorldManager {
    constructor() {
        this.chunks = [];
        this.chunkSize = 60;
        
        // Materials
        this.gravelMats = [
            new THREE.MeshStandardMaterial({ color: 0x3d3d3d, roughness: 1 }),
            new THREE.MeshStandardMaterial({ color: 0x353535, roughness: 1 })
        ];
        this.grassMat = new THREE.MeshStandardMaterial({ color: 0x487a3e, roughness: 0.9 });
        this.railMat = new THREE.MeshStandardMaterial({ color: 0xa0a5a9, metalness: 0.7, roughness: 0.2 });
        this.sleeperMat = new THREE.MeshStandardMaterial({ color: 0x2e1c11, roughness: 1 });
        
        // Tree Materials
        this.woodMat = new THREE.MeshStandardMaterial({ color: 0x4a3018, roughness: 0.9 });
        this.pineMats = [
            new THREE.MeshStandardMaterial({ color: 0x244c28, roughness: 0.8 }),
            new THREE.MeshStandardMaterial({ color: 0x1e3f22, roughness: 0.8 })
        ];
        this.leafyMats = [
            new THREE.MeshStandardMaterial({ color: 0x3a6b35, roughness: 0.8 }),
            new THREE.MeshStandardMaterial({ color: 0x457c3e, roughness: 0.8 })
        ];

        for(let i=0; i<5; i++) this.createChunk(i * -this.chunkSize);
    }

    createTree(type) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2, 6), this.woodMat);
        trunk.position.y = 1;
        trunk.castShadow = true;
        tree.add(trunk);

        if (type === 'pine') {
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 4, 6), this.pineMats[Math.floor(Math.random()*this.pineMats.length)]);
            leaves.position.y = 3.5;
            leaves.castShadow = true;
            tree.add(leaves);
        } else {
            const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(2), this.leafyMats[Math.floor(Math.random()*this.leafyMats.length)]);
            leaves.position.y = 3;
            leaves.castShadow = true;
            tree.add(leaves);
            
            // Add slight bump detail to leafy tree
            const leaves2 = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5), leaves.material);
            leaves2.position.set(0.8, 3.5, 0.5);
            leaves2.castShadow = true;
            tree.add(leaves2);
        }
        return tree;
    }

    createChunk(z) {
        const group = new THREE.Group();
        
        // Alternating Gravel ground
        for(let i=0; i<10; i++) {
            const patch = new THREE.Mesh(
                new THREE.PlaneGeometry(16, this.chunkSize / 10),
                this.gravelMats[i % 2]
            );
            patch.rotation.x = -Math.PI / 2;
            patch.position.z = (i * (this.chunkSize/10)) - (this.chunkSize/2) + (this.chunkSize/20);
            patch.receiveShadow = true;
            group.add(patch);
        }

        // Side Grass Areas
        const grassL = new THREE.Mesh(new THREE.PlaneGeometry(40, this.chunkSize), this.grassMat);
        grassL.rotation.x = -Math.PI / 2;
        grassL.position.set(-28, -0.05, 0);
        grassL.receiveShadow = true;
        
        const grassR = new THREE.Mesh(new THREE.PlaneGeometry(40, this.chunkSize), this.grassMat);
        grassR.rotation.x = -Math.PI / 2;
        grassR.position.set(28, -0.05, 0);
        grassR.receiveShadow = true;
        group.add(grassL, grassR);

        // Populate Trees
        for(let i = -this.chunkSize/2; i < this.chunkSize/2; i += (8 + Math.random()*7)) {
            // Left side trees
            const treeL = this.createTree(Math.random() > 0.5 ? 'pine' : 'leafy');
            treeL.position.set(-10 - Math.random()*15, 0, i);
            treeL.rotation.y = Math.random() * Math.PI;
            
            // Right side trees
            const treeR = this.createTree(Math.random() > 0.5 ? 'pine' : 'leafy');
            treeR.position.set(10 + Math.random()*15, 0, i);
            treeR.rotation.y = Math.random() * Math.PI;
            
            group.add(treeL, treeR);
        }

        // Rails & Sleepers
        const sleeperGeo = new THREE.BoxGeometry(14, 0.25, 0.6);
        const railGeo = new THREE.BoxGeometry(0.15, 0.35, this.chunkSize);

        for(let i = -this.chunkSize/2; i < this.chunkSize/2; i += 3) {
            const s = new THREE.Mesh(sleeperGeo, this.sleeperMat);
            s.position.set(0, 0.125, i);
            s.receiveShadow = true;
            group.add(s);
        }

        LANES.forEach(x => {
            const r1 = new THREE.Mesh(railGeo, this.railMat);
            r1.position.set(x - 0.8, 0.3, 0);
            r1.castShadow = true;
            r1.receiveShadow = true;
            const r2 = new THREE.Mesh(railGeo, this.railMat);
            r2.position.set(x + 0.8, 0.3, 0);
            r2.castShadow = true;
            r2.receiveShadow = true;
            group.add(r1, r2);
        });

        group.position.z = z;
        scene.add(group);
        this.chunks.push(group);
    }

    update() {
        this.chunks.forEach(c => {
            c.position.z += speed;
            if (c.position.z > this.chunkSize) {
                c.position.z -= this.chunkSize * this.chunks.length;
            }
        });
    }
}

/**
 * OBSTACLE MANAGER - OVERHAUL
 * New detailed geometries, logical spawning patterns, collision checks.
 */
class ObstacleManager {
    constructor() {
        this.objects = [];
        this.distTraveled = -20; // Safe distance at start
        this.spawnInterval = 35; // How often a "row" of obstacles spawns
        
        // Reusable Materials
        this.woodBeige = new THREE.MeshStandardMaterial({ color: 0xc8a97e, roughness: 0.9 });
        this.woodDark = new THREE.MeshStandardMaterial({ color: 0x8b6b4e, roughness: 0.9 });
        this.trainNavy = new THREE.MeshStandardMaterial({ color: 0x1a2b3c, roughness: 0.5 });
        this.trainRed = new THREE.MeshStandardMaterial({ color: 0x801515, roughness: 0.5 });
        this.metal = new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.6 });
        this.glass = new THREE.MeshStandardMaterial({ color: 0xa8d8ea, roughness: 0.2 });
        this.warningStrip = new THREE.MeshStandardMaterial({ color: 0xf1c40f }); // Simplification for stripe
    }

    /** * Fair Pattern Generator
     * Guarantees at least 1 free lane. Prevents train/barrier clipping.
     */
    spawnPattern() {
        let lanesToFill = [0, 1, 2];
        let freeLane = Math.floor(Math.random() * 3);
        
        for (let i = 0; i < 3; i++) {
            if (i === freeLane) continue;

            const typeRand = Math.random();
            const hasStaticObstacle = this.checkLaneHasStatic(i);

            if (typeRand < 0.3 && !hasStaticObstacle) {
                // Moving Train (Only if no static barriers are ahead in this lane)
                this.objects.push(this.createTrain(i, true));
            } else if (typeRand < 0.5) {
                // Static Train
                this.objects.push(this.createTrain(i, false));
            } else if (typeRand < 0.75) {
                // High Tunnel (Must slide)
                this.objects.push(this.createTunnel(i));
            } else {
                // Low Barrier (Must jump)
                this.objects.push(this.createBarrier(i));
            }
        }
    }

    checkLaneHasStatic(laneIndex) {
        // Checks if there are currently any non-moving objects in this lane
        for (let o of this.objects) {
            if (o.lane === laneIndex && !o.moves) return true;
        }
        return false;
    }

    createTrain(laneIndex, moves) {
        const group = new THREE.Group();
        const colorMat = Math.random() > 0.5 ? this.trainNavy : this.trainRed;
        
        // Main Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(3.4, 4.2, 14), colorMat);
        body.position.y = 2.4;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        // Raised Roof
        const roof = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.4, 14.2), this.metal);
        roof.position.y = 4.6;
        roof.castShadow = true;
        group.add(roof);

        // Connectors (Front/Back)
        const conn = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 1, 16), this.metal);
        conn.rotation.x = Math.PI / 2;
        conn.position.set(0, 1.5, 7.2);
        group.add(conn);

        // Windows
        for(let z = -5; z <= 5; z += 3.5) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2), this.glass);
            win.position.set(1.71, 3.2, z);
            win.rotation.y = Math.PI/2;
            const winL = win.clone();
            winL.position.set(-1.71, 3.2, z);
            winL.rotation.y = -Math.PI/2;
            group.add(win, winL);
        }

        // Graffiti (Random colored quads)
        const grafColors = [0xff9f43, 0x10ac84, 0x5f27cd, 0xee5253];
        const grafMat = new THREE.MeshBasicMaterial({ color: grafColors[Math.floor(Math.random()*grafColors.length)] });
        const graf = new THREE.Mesh(new THREE.PlaneGeometry(3, 1.2), grafMat);
        graf.position.set(1.71, 1.5, 0);
        graf.rotation.y = Math.PI/2;
        group.add(graf);

        // Wheels
        for(let z = -5; z <= 5; z += 10) {
            const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3.6, 16), new THREE.MeshStandardMaterial({color:0x111111}));
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(0, 0.4, z);
            group.add(wheel);
        }

        group.position.set(LANES[laneIndex], 0, -150);
        scene.add(group);
        return { mesh: group, type: 'train', lane: laneIndex, moves: moves, hitbox: new THREE.Box3() };
    }

    createTunnel(laneIndex) {
        const group = new THREE.Group();
        // Wooden top beam
        const top = new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.2, 0.6), this.woodBeige);
        top.position.y = 3.6;
        top.castShadow = true;
        
        // Side supports
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), this.woodBeige);
        legL.position.set(-1.5, 1.5, 0);
        legL.castShadow = true;
        const legR = legL.clone();
        legR.position.x = 1.5;
        
        group.add(top, legL, legR);
        group.position.set(LANES[laneIndex], 0, -150);
        scene.add(group);
        return { mesh: group, type: 'tunnel', lane: laneIndex, moves: false, hitbox: new THREE.Box3() };
    }

    createBarrier(laneIndex) {
        const group = new THREE.Group();
        // Main beige face
        const main = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1.8, 0.4), this.woodBeige);
        main.position.y = 0.9;
        main.castShadow = true;
        
        // Darker backing for bevel effect
        const back = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.6, 0.6), this.woodDark);
        back.position.y = 0.9;
        
        // Yellow warning strip
        const strip = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 0.3), this.warningStrip);
        strip.position.set(0, 1.4, 0.21);

        group.add(main, back, strip);
        group.position.set(LANES[laneIndex], 0, -150);
        scene.add(group);
        return { mesh: group, type: 'barrier', lane: laneIndex, moves: false, hitbox: new THREE.Box3() };
    }

    update(delta) {
        this.distTraveled += speed;
        
        // Dense but fair spawning logic
        if (this.distTraveled >= this.spawnInterval) {
            this.spawnPattern();
            this.distTraveled = 0;
            // Minor variation in spacing
            this.spawnInterval = 30 + Math.random() * 15; 
        }

        for (let i = this.objects.length - 1; i >= 0; i--) {
            const o = this.objects[i];
            
            // Move objects relative to player speed
            // If moves == true, train is moving TOWARDS player at its own speed (0.35)
            o.mesh.position.z += speed + (o.moves ? 0.35 : 0);
            
            // Shrink hitbox slightly to prevent unfair clipping on edges
            o.hitbox.setFromObject(o.mesh);
            o.hitbox.expandByScalar(-0.2); 

            // COLLISION DETECTION
            if (player.hitbox.intersectsBox(o.hitbox)) {
                if (o.type === 'train' && player.y >= 4.4) {
                    // Safe on top of train
                    player.y = 5.0;
                    player.velocityY = 0;
                    player.isJumping = false;
                } 
                else if (o.type === 'tunnel' && player.isSliding) {
                    // Safe sliding under tunnel
                }
                else {
                    endGame(); // Hit detected
                }
            } 
            // Fall off train logic
            else if (o.type === 'train' && player.y > 4.4 && player.group.position.z > o.mesh.position.z - 7.5 && player.group.position.z < o.mesh.position.z + 7.5) {
                // Staying on train
            } else if (player.y > 4.4 && !player.isJumping) {
                // Walked off the edge of a train
                player.isJumping = true;
                player.velocityY = 0;
            }

            // Cleanup passed objects
            if (o.mesh.position.z > 20) {
                scene.remove(o.mesh);
                this.objects.splice(i, 1);
            }
        }
    }
}

/**
 * CORE ENGINE
 */
function init() {
    scene = new THREE.Scene();
    // Sky blue fading to warm horizon via fog
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0xebd4c0, 40, 130);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 2, -10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft edges
    document.body.appendChild(renderer.domElement);

    // Warm Directional Sunlight
    const sun = new THREE.DirectionalLight(0xfff0dd, 1.2);
    sun.position.set(-20, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 150;
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 50;
    sun.shadow.camera.bottom = -50;
    scene.add(sun);

    // Soft Ambient Fill
    const ambient = new THREE.AmbientLight(0x404040, 0.8);
    scene.add(ambient);

    player = new Player();
    worldManager = new WorldManager();
    obstacleManager = new ObstacleManager();
    clock = new THREE.Clock();

    window.addEventListener('keydown', handleKeys);
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    animate();
}

function handleKeys(e) {
    if (!isPlaying) return;
    const key = e.key.toLowerCase();
    if (key === 'a' || e.key === 'ArrowLeft') player.lane = Math.max(0, player.lane - 1);
    if (key === 'd' || e.key === 'ArrowRight') player.lane = Math.min(2, player.lane + 1);
    if (key === 'w' || key === ' ' || e.key === 'ArrowUp') player.jump();
    if (key === 's' || e.key === 'ArrowDown') player.slide();
    player.targetX = LANES[player.lane];
}

function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    isPlaying = true;
}

function endGame() {
    isPlaying = false;
    document.getElementById('game-over').classList.remove('hidden');
    document.getElementById('final-score').innerText = `Distance: ${Math.floor(score)}m`;
}

function resetGame() {
    location.reload(); 
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if (isPlaying) {
        // Reduced speed increment for a steadier difficulty curve
        speed += 0.00002; 
        
        // Reduced score multiplier (feels more earned)
        score += speed * 4; 
        document.getElementById('score-val').innerText = Math.floor(score);
        
        player.update(delta);
        worldManager.update();
        obstacleManager.update(delta);

        // Smooth Camera Follow
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 6 + (player.y * 0.4), 0.1);
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, player.group.position.x * 0.3, 0.05);
    } else {
        // Idle camera sway on menu
        const t = Date.now() * 0.0005;
        camera.position.x = Math.sin(t) * 2;
        camera.lookAt(0, 2, -10);
    }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
